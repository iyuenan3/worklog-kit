# worklog-kit configuration (committed to git; credentials go in worklog.config.local.yaml, which is gitignored)
# Run /worklog-init to generate this interactively; afterwards edits take effect immediately (read on every ingest run).
schema_version: 1

timezone: UTC                  # diary attribution timezone (asked during init)
day_boundary: "07:00"          # date split line: work between 00:00 and this time belongs to the previous day
language: en                   # zh / en: skeleton locale, writing conventions, punctuation gate

identities: []                 # git author filter: every email / name you have committed with (prefilled by init)

sources:
  # Local project scan: auto-discovers git repos under roots (limited depth); an unmounted root is noted and skipped
  - type: local-git
    roots: [~/projects]
    assume: active
  # To keep a project out: drop a .worklogignore file in its root, or set level: exclude in projects.overrides
  # More source examples (init generates these from "where does your work happen"):
  # - {type: github, account: your-name, assume: active}
  # - {type: remote-ssh, host: workbox, roots: ["~/projects"], assume: active, on_unreachable: note}   # roots = project parent dirs on the remote machine (required by scan.sh)
  # - {type: im, provider: feishu, via: lark-cli, chats: ["oc_xxx"], me: "<open_id or name>", on_unreachable: note, record_others: false}   # set up via feishu-setup
  # - {type: local-dir, path: ~/writing/notes, track: mtime}    # non-git projects must be declared explicitly

projects:
  default_level: detail        # level used when an overrides entry omits `level` (detail / summary / presence / exclude)
  on_new_project: presence     # initial level for newly discovered projects (safe default: existence + commit count only)
  overrides: []                # bulk leveling by path, e.g. {match: "~/employer/**", level: summary}; optional github_slug: "gh:owner/repo" pins the remote repo (cross-source merge)

modules:
  life_section: true           # "Life" section in the diary

index_recent_days: 3           # how many days of summaries the wiki index header keeps

diary_title_template: "# Work diary: {year}-{month}-{day} ({weekday})"   # {weekday} resolves to the full English weekday name (e.g. Saturday)

# upstream_repo: https://github.com/iyuenan3/worklog-kit   # source for worklog-update; fork users point this at their upstream
