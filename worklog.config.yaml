# worklog-kit 配置（入 git；任何凭证 / 密钥放 worklog.config.local.yaml，那份被 .gitignore 排除）
# 首次使用跑 /worklog-init 交互生成；之后手改即生效（ingest 每次运行时读取）。
schema_version: 1

timezone: Asia/Shanghai        # 日记归属时区（init 时询问）
day_boundary: "07:00"          # 日期分割线：00:00 至该时刻的工作归前一天（按你的作息调整）
language: zh                   # zh / en：骨架 locale、写作规范、标点门按此切换

identities: []                 # git 署名过滤：你 commit 用过的全部 email / 名字（init 自动预填）

sources:
  # 本机项目扫描：roots 下有限深度自动发现 git 仓；未挂载的 root 记一句跳过（常态路径）
  - type: local-git
    roots: [~/projects]
    assume: active
  # 不想被记录的项目：项目根放 .worklogignore，或 projects.overrides 配 level: exclude
  # 其余源示例（init 按「你的工作都发生在哪」逐个生成）：
  # - {type: github, account: your-name, assume: active}
  # - {type: remote-ssh, host: workbox, roots: ["~/projects"], assume: active, on_unreachable: note}   # roots = 远端机上的项目父目录（scan.sh 必需）
  # - {type: im, provider: feishu, via: lark-cli, chats: ["oc_xxx"], me: "<open_id 或姓名>", on_unreachable: note, record_others: false}   # 接入走 feishu-setup
  # - {type: local-dir, path: ~/writing/notes, track: mtime}    # 非 git 项目须显式声明

projects:
  default_level: detail        # overrides 条目未显式给 level 时用此级别（detail / summary / presence / exclude）
  on_new_project: presence     # 新发现项目的初始级别（安全默认：只记存在与 commit 数，晨报待定级）
  overrides: []                # 按路径批量定级，如 {match: "~/employer/**", level: summary}；可选 github_slug: "gh:owner/repo" 显式绑定远端仓（跨源归并）

modules:
  life_section: true           # 日记「生活」段开关

index_recent_days: 3           # wiki index 头部保留最近几天的摘要

maintenance:                   # vault 体检阈值（lint --health / worklog-maintain；全部可选，删掉即用脚本内置默认值）
  drift_days: 14               # 状态漂移：项目页 last_updated 落后最近提及日记的天数
  orphan_days: 60              # 孤儿页：N 天无日记引用且无 wiki 入链
  bloat_kb: 50                 # 膨胀：单个 wiki 页体积上限（KB）
  decision_log_max: 30         # 膨胀：项目页决策日志条数上限
  todo_stale_days: [30, 90]    # TODO 年龄分档：开放任务超过 N 天报待维护

diary_title_template: "# 工作日记：{year}年{month}月{day}日（{weekday}）"   # {weekday} 解析为 周X（与 frontmatter day 及日期门校验一致）

# upstream_repo: https://github.com/iyuenan3/worklog-kit   # worklog-update 拉取源；fork 用户改成自己的上游

# ── 敏感配置层：worklog.config.local.yaml（与本文件同目录，已被 .gitignore 排除）──
# 读取规则：skill 加载本文件后用 local 文件同名键覆盖；local 不存在 = 正常，静默跳过。
# 原则：任何 token / 密码 / 私有 URL / 内网主机名只放 local，绝不写进本文件。
# v0.1 内置源都无需在 local 存凭证（remote-ssh 走 ~/.ssh、feishu 走 lark-cli 自身认证、github 走 gh）；
# 该层为未来连接器与自定义字段预留，示例：
# my_custom_source:
#   api_token: "xxxx"
